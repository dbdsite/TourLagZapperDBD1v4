<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финальная Турнирная Сетка</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e22;
            --card-border: #2d2d30;
            --text-color: #e2e8f0;
            --line-color: #4b5563;
            --win-color: #22c55e;
            --lose-color: #a855f7;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-weight: 500;
            font-size: 20px;
        }

        .tournament-tree {
            display: flex;
            flex-direction: column;
            gap: 40px;
            min-width: max-content;
            padding: 10px;
        }

        .bracket-row {
            display: flex;
            gap: 40px;
            position: relative;
        }

        .round-column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 190px;
            position: relative;
        }

        .round-header {
            text-align: center;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a1a1aa;
            position: absolute;
            top: -30px;
            width: 100%;
            border-bottom: 1px solid #2d2d30;
            padding-bottom: 4px;
        }

        .match-slot {
            display: flex;
            flex-direction: column;
            margin: 4px 0;
            position: relative;
        }

        .match-table {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            font-size: 11px;
            height: 20px;
            border-bottom: 1px solid #2d2d30;
        }

        .team-row:last-child {
            border-bottom: none;
        }

        .team-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
            flex-grow: 1;
            margin-right: 4px;
        }

        .winner-table { border-left: 3px solid var(--win-color); }
        .places-table { border-left: 3px solid var(--lose-color); }

        .badge {
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 9px;
        }
        .gold { color: var(--win-color); background: rgba(34, 197, 94, 0.1); }
        .silver-bronze { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }

        .grid-separator {
            height: 1px;
            background: #202024;
            margin: 20px 0;
        }

        .round-column:not(:last-child) .match-slot::after {
            content: ""; position: absolute; right: -24px; top: 50%; width: 24px; height: 1px; background: var(--line-color); z-index: 1;
        }
        .round-column:not(:first-child) .match-slot::before {
            content: ""; position: absolute; left: -18px; top: 50%; width: 18px; height: 1px; background: var(--line-color); z-index: 1;
        }
        .lower-bracket .round-column:not(:last-child) .match-slot::after { background: var(--lose-color); }
        .lower-bracket .round-column:not(:first-child) .match-slot::before { background: var(--lose-color); }
        
        #loader {
            text-align: center;
            color: #f59e0b;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>Глобальное Tournament-Дерево</h1>
    <div id="loader">Синхронизация с Google Таблицей...</div>

    <div class="tournament-tree">
        
        <div class="bracket-row">
            <div class="round-column" id="round-0"><div class="round-header">Отборочный этап (16)</div></div>
            <div class="round-column" id="round-1"><div class="round-header">Основной этап (8)</div></div>
            <div class="round-column" id="round-2"><div class="round-header">Полуфинал (4)</div></div>
            <div class="round-column" id="round-3"><div class="round-header">Финал (4 команды)</div></div>
            <div class="round-column" id="round-4"><div class="round-header">Гранд Финал (2)</div></div>
            <div class="round-column" id="round-5">
                <div class="round-header">Победитель</div>
                <div class="match-slot">
                    <div class="match-table winner-table">
                        <div class="team-row" style="height: 25px;">
                            <span class="team-name" id="winner-name" style="font-weight: bold; color: #fff;">🏆 Ожидание...</span>
                            <span class="badge gold">Чемпион</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-separator"></div>

        <div class="bracket-row lower-bracket">
            <div class="round-column" style="visibility: hidden;"></div>
            <div class="round-column" style="visibility: hidden;"></div>
            <div class="round-column" id="loser-round-1"><div class="round-header">Луз-сетка (4)</div></div>
            <div class="round-column" id="loser-round-2"><div class="round-header">Луз-Финал (4 команды)</div></div>
            <div class="round-column" id="loser-round-3"><div class="round-header">Луз-Гранд-Финал (2)</div></div>
            <div class="round-column">
                <div class="round-header">Призеры ЛС</div>
                <div class="match-slot">
                    <div class="match-table places-table">
                        <div class="team-row"><span class="team-name" id="place-2" style="color: #fff;">🥈 2 МЕСТО</span><span class="badge silver-bronze">Серебро</span></div>
                    </div>
                </div>
                <div class="match-slot">
                    <div class="match-table places-table">
                        <div class="team-row"><span class="team-name" id="place-3" style="color: #fff;">🥉 3 МЕСТО</span><span class="badge silver-bronze">Бронза</span></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQwQQX4mjoXxy_xlq7bu57qq5RPdGZ76R46_G7WdJ9Y_-7OyEv5Lp9GUFWg7PaG1LeYludu6ShXeQFX/pub?gid=0&single=true&output=csv';

        // Конфигурация количества ячеек для генерации дерева
        const treeStructure = {
            'round-0': 16, 'round-1': 8, 'round-2': 4, 'round-3': 2, 'round-4': 1,
            'loser-round-1': 4, 'loser-round-2': 2, 'loser-round-3': 1
        };

        // Генерация пустой верстки для всех раундов
        Object.keys(treeStructure).forEach(roundId => {
            const container = document.getElementById(roundId);
            const totalMatches = treeStructure[roundId];
            
            for(let i = 0; i < totalMatches; i++) {
                const slot = document.createElement('div');
                slot.className = 'match-slot';
                slot.innerHTML = `
                    <div class="match-table">
                        <div class="team-row" id="${roundId}-m${i}-t0"><span class="team-name">Ожидание...</span></div>
                        <div class="team-row" id="${roundId}-m${i}-t1"><span class="team-name">Ожидание...</span></div>
                    </div>`;
                container.appendChild(slot);
            }
        });

        // Карта распределения строк из Колонки B таблицы по конкретным местам в сетке
        const cellMapping = [
            // Верхняя сетка (Раунд 1, 2, 3, 4, Победитель)
            { type: 'node', round: 'round-1', m: 0, t: 0, index: 32 },  { type: 'node', round: 'round-1', m: 0, t: 1, index: 33 },
            { type: 'node', round: 'round-1', m: 1, t: 0, index: 34 },  { type: 'node', round: 'round-1', m: 1, t: 1, index: 35 },
            { type: 'node', round: 'round-1', m: 2, t: 0, index: 36 },  { type: 'node', round: 'round-1', m: 2, t: 1, index: 37 },
            { type: 'node', round: 'round-1', m: 3, t: 0, index: 38 },  { type: 'node', round: 'round-1', m: 3, t: 1, index: 39 },
            { type: 'node', round: 'round-1', m: 4, t: 0, index: 40 },  { type: 'node', round: 'round-1', m: 4, t: 1, index: 41 },
            { type: 'node', round: 'round-1', m: 5, t: 0, index: 42 },  { type: 'node', round: 'round-1', m: 5, t: 1, index: 43 },
            { type: 'node', round: 'round-1', m: 6, t: 0, index: 44 },  { type: 'node', round: 'round-1', m: 6, t: 1, index: 45 },
            { type: 'node', round: 'round-1', m: 7, t: 0, index: 46 },  { type: 'node', round: 'round-1', m: 7, t: 1, index: 47 },

            { type: 'node', round: 'round-2', m: 0, t: 0, index: 48 },  { type: 'node', round: 'round-2', m: 0, t: 1, index: 49 },
            { type: 'node', round: 'round-2', m: 1, t: 0, index: 50 },  { type: 'node', round: 'round-2', m: 1, t: 1, index: 51 },
            { type: 'node', round: 'round-2', m: 2, t: 0, index: 52 },  { type: 'node', round: 'round-2', m: 2, t: 1, index: 53 },
            { type: 'node', round: 'round-2', m: 3, t: 0, index: 54 },  { type: 'node', round: 'round-2', m: 3, t: 1, index: 55 },

            { type: 'node', round: 'round-3', m: 0, t: 0, index: 56 },  { type: 'node', round: 'round-3', m: 0, t: 1, index: 57 },
            { type: 'node', round: 'round-3', m: 1, t: 0, index: 58 },  { type: 'node', round: 'round-3', m: 1, t: 1, index: 59 },

            { type: 'node', round: 'round-4', m: 0, t: 0, index: 60 },  { type: 'node', round: 'round-4', m: 0, t: 1, index: 61 },
            { type: 'id', id: 'winner-name', prefix: '🏆 ', index: 62 },

            // Нижняя сетка (Луз раунды 1, 2, 3 и Места)
            { type: 'node', round: 'loser-round-1', m: 0, t: 0, index: 63 }, { type: 'node', round: 'loser-round-1', m: 0, t: 1, index: 64 },
            { type: 'node', round: 'loser-round-1', m: 1, t: 0, index: 65 }, { type: 'node', round: 'loser-round-1', m: 1, t: 1, index: 66 },
            { type: 'node', round: 'loser-round-1', m: 2, t: 0, index: 67 }, { type: 'node', round: 'loser-round-1', m: 2, t: 1, index: 68 },
            { type: 'node', round: 'loser-round-1', m: 3, t: 0, index: 69 }, { type: 'node', round: 'loser-round-1', m: 3, t: 1, index: 70 },

            { type: 'node', round: 'loser-round-2', m: 0, t: 0, index: 71 }, { type: 'node', round: 'loser-round-2', m: 0, t: 1, index: 72 },
            { type: 'node', round: 'loser-round-2', m: 1, t: 0, index: 73 }, { type: 'node', round: 'loser-round-2', m: 1, t: 1, index: 74 },

            { type: 'node', round: 'loser-round-3', m: 0, t: 0, index: 75 }, { type: 'node', round: 'loser-round-3', m: 0, t: 1, index: 76 },
            { type: 'id', id: 'place-2', prefix: '🥈 ', index: 77 },
            { type: 'id', id: 'place-3', prefix: '🥉 ', index: 78 }
        ];

        async function updateTreeFromSheets() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + '&cachebust=' + Date.now());
                if (!response.ok) throw new Error('Сеть не отвечает');
                const csvData = await response.text();
                
                // Преобразуем CSV в двумерный массив [строка][колонка]
                const rows = csvData.split(/\r?\n/).map(line => {
                    return line.split(',').map(cell => cell.replace(/^"|"$/g, '').trim());
                });

                // 1. Заполняем самый первый Отборочный этап из колонки A (строки 1-32)
                for (let i = 0; i < 16; i++) {
                    for (let t = 0; t < 2; t++) {
                        const rowIndex = i * 2 + t;
                        const teamName = (rows[rowIndex] && rows[rowIndex][0]) ? rows[rowIndex][0] : `Команда ${rowIndex + 1}`;
                        const el = document.querySelector(`#round-0-m${i}-t${t} .team-name`);
                        if (el) el.innerText = teamName;
                    }
                }

                // 2. Распределяем все последующие этапы из колонки B (строки с 33 по 79)
                cellMapping.forEach(map => {
                    // В массиве rows индексы начинаются с 0, поэтому строка 33 — это индекс 32
                    const value = (rows[map.index] && rows[map.index][1]) ? rows[map.index][1] : '';
                    
                    if (map.type === 'node') {
                        const el = document.querySelector(`#${map.round}-m${map.m}-t${map.t} .team-name`);
                        if (el) el.innerText = value || 'Ожидание...';
                    } else if (map.type === 'id') {
                        const el = document.getElementById(map.id);
                        if (el) el.innerText = value ? (map.prefix + value) : (map.prefix + 'Ожидание...');
                    }
                });

                document.getElementById('loader').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loader').innerText = "❌ Ошибка синхронизации. Проверьте сеть.";
            }
        }

        // Запуск при загрузке и автообновление каждые 30 секунд
        window.addEventListener('DOMContentLoaded', () => {
            updateTreeFromSheets();
            setInterval(updateTreeFromSheets, 30000);
        });
    </script>
</body>
</html>
